[package]
name = "ai-streaming-core"
version = "0.0.0"
edition = "2021"
publish = false
description = "Rust streaming-core port for the pi ai package (migration pilot). Currently: partial-JSON parity gate."

[lib]
path = "src/lib.rs"
# cdylib: the wasm32 output for the FFI integration gate. rlib: keep tests/*.rs and
# the `pub use` consumers (native conformance tests) linkable.
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# `gate` selects the pure, offline conformance build (no NAPI / node linkage).
# It is a no-op today (no NAPI yet) so `cargo test --features gate` works as the CI entry point.
default = []
gate = []

# wasm-bindgen is resolved ONLY when compiling for wasm32. The host build
# (`cargo test --features gate`) sees target_arch != wasm32, so it is never
# compiled and the native conformance build stays dependency-free and green.
# The version MUST equal the `wasm-bindgen-cli` used to generate the committed
# glue under packages/ai/test/gate/wasm/, or the .wasm will not instantiate.
[target.'cfg(target_arch="wasm32")'.dependencies]
wasm-bindgen = "=0.2.100"
